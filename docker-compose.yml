# =============================================================================
# Docker Compose - Scrapers PR y SV
# =============================================================================
# 
# Uso:
#   docker-compose up -d              # Levantar ambos con cron
#   docker-compose up pr-scraper -d   # Solo PR
#   docker-compose up sv-scraper -d   # Solo SV
#
#   docker-compose run --rm pr-scraper-manual   # Ejecutar PR manualmente
#   docker-compose run --rm sv-scraper-manual   # Ejecutar SV manualmente
#
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # PR SCRAPER - PR Autopartes
  # ===========================================================================
  pr-scraper:
    build: .
    container_name: pr-scraper
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
      - SCRAPER_NAME=PR
      - SCRAPER_SCHEDULE=${PR_SCHEDULE:-0 */2 * * *}
    command: >
      bash -c "
        echo 'PR Scraper - Iniciando con cron: $$SCRAPER_SCHEDULE' &&
        echo \"$$SCRAPER_SCHEDULE cd /app && python main.py >> /app/logs/pr-scraper.log 2>&1\" > /etc/cron.d/scraper &&
        chmod 0644 /etc/cron.d/scraper &&
        crontab /etc/cron.d/scraper &&
        echo 'Cron configurado. Ejecutando primera corrida (no bloqueante)...' &&
        python main.py >> /app/logs/pr-scraper.log 2>&1 || echo 'Primera corrida falló, el cron reintentará' &&
        echo 'Iniciando cron daemon...' &&
        cron -f
      "
    restart: unless-stopped

  # PR Scraper - Ejecución manual (one-shot)
  pr-scraper-manual:
    build: .
    container_name: pr-scraper-manual
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
    command: python main.py
    profiles: ["manual"]

  # ===========================================================================
  # SV SCRAPER - Servicios Viales
  # ===========================================================================
  sv-scraper:
    build: .
    container_name: sv-scraper
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
      - SCRAPER_NAME=SV
      - SCRAPER_SCHEDULE=${SV_SCHEDULE:-0 */4 * * *}
    command: >
      bash -c "
        echo 'SV Scraper - Iniciando con cron: $$SCRAPER_SCHEDULE' &&
        echo \"$$SCRAPER_SCHEDULE cd /app && python sv_scraper_v2.py >> /app/logs/sv-scraper.log 2>&1\" > /etc/cron.d/scraper &&
        chmod 0644 /etc/cron.d/scraper &&
        crontab /etc/cron.d/scraper &&
        echo 'Cron configurado. Ejecutando primera corrida (no bloqueante)...' &&
        python sv_scraper_v2.py >> /app/logs/sv-scraper.log 2>&1 || echo 'Primera corrida falló, el cron reintentará' &&
        echo 'Iniciando cron daemon...' &&
        cron -f
      "
    restart: unless-stopped

  # SV Scraper - Ejecución manual (one-shot)
  sv-scraper-manual:
    build: .
    container_name: sv-scraper-manual
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
    command: python sv_scraper_v2.py
    profiles: ["manual"]

  # ===========================================================================
  # SV SCRAPER DRY-RUN - Para testing
  # ===========================================================================
  sv-scraper-dry:
    build: .
    container_name: sv-scraper-dry
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
    command: python sv_scraper_v2.py --dry-run
    profiles: ["test"]

  # ===========================================================================
  # REPLENISHMENT RULES - Crear reglas de reabastecimiento (producción)
  # ===========================================================================
  # Uso:
  #   docker-compose run --rm replenishment-dry      # Preview
  #   docker-compose run --rm replenishment          # Ejecutar
  
  replenishment:
    build: .
    container_name: replenishment
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=America/Argentina/Buenos_Aires
    command: python scripts/create_replenishment_rules.py
    profiles: ["manual"]

  replenishment-dry:
    build: .
    container_name: replenishment-dry
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=America/Argentina/Buenos_Aires
    command: python scripts/create_replenishment_rules.py --dry-run
    profiles: ["manual"]

  # ===========================================================================
  # REPLENISHMENT MIN/MAX - Actualizar min/max basado en rotación (producción)
  # ===========================================================================
  # Fórmula: min = ceil(rotation), max = ceil(rotation) * 2
  # Uso:
  #   docker-compose run --rm replenishment-minmax-dry   # Preview
  #   docker-compose run --rm replenishment-minmax       # Ejecutar
  
  replenishment-minmax:
    build: .
    container_name: replenishment-minmax
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - MINMAX_SCHEDULE=${MINMAX_SCHEDULE:-0 6 * * *}
    command: >
      bash -c "
        echo 'Replenishment Min/Max - Cron: $$MINMAX_SCHEDULE (6 AM Argentina)' &&
        echo \"$$MINMAX_SCHEDULE cd /app && python scripts/update_replenishment_minmax.py >> /app/logs/replenishment-minmax.log 2>&1\" > /etc/cron.d/minmax &&
        chmod 0644 /etc/cron.d/minmax &&
        crontab /etc/cron.d/minmax &&
        echo 'Ejecutando primera corrida...' &&
        python scripts/update_replenishment_minmax.py &&
        echo 'Primera corrida completada. Iniciando cron daemon...' &&
        cron -f
      "
    restart: unless-stopped

  replenishment-minmax-manual:
    build: .
    container_name: replenishment-minmax-manual
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=America/Argentina/Buenos_Aires
    command: python scripts/update_replenishment_minmax.py
    profiles: ["manual"]

  replenishment-minmax-dry:
    build: .
    container_name: replenishment-minmax-dry
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=America/Argentina/Buenos_Aires
    command: python scripts/update_replenishment_minmax.py --dry-run
    profiles: ["manual"]
