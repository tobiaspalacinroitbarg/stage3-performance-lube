# =============================================================================
# Docker Compose - Scrapers Performance Lube
# =============================================================================
#
# USO:
#   docker-compose up scrapers          # Corre todo una vez (PR -> SV -> MinMax)
#   docker-compose up scrapers-cron -d  # Cron cada 4 horas
#
# =============================================================================

services:
  # ===========================================================================
  # SCRAPERS - Todos en serie (RECOMENDADO)
  # ===========================================================================
  scrapers:
    build: .
    container_name: scrapers
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
    command: >
      bash -c "
        echo '========================================' &&
        echo 'SCRAPERS - Ejecucion secuencial' &&
        echo '========================================' &&
        echo '' &&
        echo '[1/3] PR Scraper - PR Autopartes' &&
        echo '----------------------------------------' &&
        python main.py --once &&
        echo '' &&
        echo 'Esperando 60s antes del siguiente...' &&
        sleep 60 &&
        echo '' &&
        echo '[2/3] SV Scraper - Servicios Viales' &&
        echo '----------------------------------------' &&
        python sv_scraper_v2.py &&
        echo '' &&
        echo 'Esperando 60s antes del siguiente...' &&
        sleep 60 &&
        echo '' &&
        echo '[3/3] Replenishment Min/Max' &&
        echo '----------------------------------------' &&
        python scripts/update_replenishment_minmax.py &&
        echo '' &&
        echo '========================================' &&
        echo 'COMPLETADO - Todos los scrapers OK' &&
        echo '========================================'
      "

  # ===========================================================================
  # SCRAPERS CON CRON - Cada 4 horas
  # ===========================================================================
  scrapers-cron:
    build: .
    container_name: scrapers-cron
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
      - SCRAPERS_SCHEDULE=${SCRAPERS_SCHEDULE:-0 */4 * * *}
    command: >
      bash -c "
        echo 'Scrapers Cron - Schedule: $$SCRAPERS_SCHEDULE' &&
        echo \"$$SCRAPERS_SCHEDULE cd /app && python main.py --once && sleep 60 && python sv_scraper_v2.py && sleep 60 && python scripts/update_replenishment_minmax.py >> /app/logs/scrapers.log 2>&1\" > /etc/cron.d/scrapers &&
        chmod 0644 /etc/cron.d/scrapers &&
        crontab /etc/cron.d/scrapers &&
        echo 'Cron configurado. Iniciando daemon...' &&
        cron -f
      "
    restart: unless-stopped

  # ===========================================================================
  # SERVICIOS INDIVIDUALES (para debug)
  # ===========================================================================
  pr-scraper:
    build: .
    container_name: pr-scraper
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
    command: python main.py --once
    profiles: ["individual"]

  sv-scraper:
    build: .
    container_name: sv-scraper
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - HEADLESS=true
      - TZ=America/Argentina/Buenos_Aires
    command: python sv_scraper_v2.py
    profiles: ["individual"]

  replenishment-minmax:
    build: .
    container_name: replenishment-minmax
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=America/Argentina/Buenos_Aires
    command: python scripts/update_replenishment_minmax.py
    profiles: ["individual"]
